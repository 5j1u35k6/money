<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CUPICHO PRO V7.2</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
  
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

  <style>
    body { background-color: #020617; color: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-tap-highlight-color: transparent;}
    .glass-card { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(51, 65, 85, 0.5); backdrop-filter: blur(12px); }
    
    .modal-overlay { 
        position: fixed; inset: 0; 
        background: rgba(2, 6, 23, 0.95); backdrop-filter: blur(15px); 
        z-index: 2000; 
        display: flex; flex-direction: column; 
        padding: 24px; 
        padding-bottom: max(40px, env(safe-area-inset-bottom)); 
        animation: slideUp 0.3s ease-out; overflow-y: auto;
    }
    
    @keyframes slideUp { from { transform: translateY(30%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .flash-active { animation: flash 0.3s ease-out; }
    @keyframes flash { 0% { background: rgba(251, 191, 36, 0.5); } 100% { background: transparent; } }
    select { text-overflow: ellipsis; }
    .cursor-pointer { cursor: pointer; }
    
    input[type=number]::-webkit-inner-spin-button, 
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    
    #reader { width: 100%; display: flex; justify-content: center; overflow: hidden; position: relative; }
    #reader video { width: 100% !important; object-fit: cover !important; transform: scale(1.2); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const firebaseConfig = {
      apiKey: "AIzaSyA7636rgPhQNCM8V9mgG6uCxKTxpBU7v70",
      authDomain: "cupicho-inventory.firebaseapp.com",
      projectId: "cupicho-inventory",
      storageBucket: "cupicho-inventory.firebasestorage.app",
      messagingSenderId: "1079825488345",
      appId: "1:1079825488345:web:b0446ca4f7ef83675461c8",
      measurementId: "G-9J582TMT6L"
    };

    let db = null;
    if (firebaseConfig) {
      try {
        firebase.initializeApp(firebaseConfig);
        db = firebase.firestore();
      } catch(e) { console.error("Firebase Error", e); }
    }

    const LOCATIONS = [
      "辦公室", "梯間", "櫃檯區", "Anthon Berg (展示桌+珠寶櫃+壁櫃)", "DOMORI (展示桌+珠寶櫃+壁櫃)",
      "Best Selling", "Gifts A", "Gifts B", "Elit", "Baci", "Belgian+Hamlet", "Caffarel+Guylian",
      "片裝牆", "Ruta", "Mieszko", "酒區", "中島A", "中島B", "中島C", "中島D", 
      "展示桌A(散巧前方)", "展示桌B(主視覺)", "展示桌C(長桌)"
    ];

    function App() {
      const [masterData, setMasterData] = useState(() => JSON.parse(localStorage.getItem('cup_master')) || []);
      const [rawCsvData, setRawCsvData] = useState(() => JSON.parse(localStorage.getItem('cup_raw_csv')) || null);
      const [inventory, setInventory] = useState(() => JSON.parse(localStorage.getItem('cup_inv')) || []);
      const [manualBinds, setManualBinds] = useState(() => JSON.parse(localStorage.getItem('cup_binds')) || {});
      const [completedLocations, setCompletedLocations] = useState(() => JSON.parse(localStorage.getItem('cup_completed_locs')) || []);
      
      const [currentLocation, setCurrentLocation] = useState(LOCATIONS[0]);      
      const [scannedBarcode, setScannedBarcode] = useState('');
      const [nameSearchResults, setNameSearchResults] = useState([]); 
      const [currentItem, setCurrentItem] = useState(null); 
      const [qty, setQty] = useState('');
      const [feedback, setFeedback] = useState('');
      const [isScanning, setIsScanning] = useState(false);
      
      const scannerRef = useRef(null);

      const [showAdmin, setShowAdmin] = useState(false);
      const [showSummary, setShowSummary] = useState(false);
      const [unknownBarcode, setUnknownBarcode] = useState(null);
      const [searchQuery, setSearchQuery] = useState('');
      const [newProductName, setNewProductName] = useState('');

      const dataRef = useRef({ masterData, manualBinds, inventory, currentLocation });

      useEffect(() => { 
        dataRef.current = { masterData, manualBinds, inventory, currentLocation }; 
      }, [masterData, manualBinds, inventory, currentLocation]);

      useEffect(() => {
        if (!db) return;
        const unsubscribe = db.collection('inventory_sessions').doc('current').onSnapshot((doc) => {
            if (doc.exists) {
                const cloudData = doc.data().items || [];
                setInventory(cloudData);
                localStorage.setItem('cup_inv', JSON.stringify(cloudData));
            }
        });
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!db) return;
        const unsubscribeBinds = db.collection('inventory_settings').doc('global_binds').onSnapshot((doc) => {
            if (doc.exists) {
                const cloudBinds = doc.data().binds || {};
                setManualBinds(cloudBinds);
                localStorage.setItem('cup_binds', JSON.stringify(cloudBinds));
            }
        });
        return () => unsubscribeBinds();
      }, []);

      useEffect(() => {
        if (!db) return;
        const unsubscribeMaster = db.collection('inventory_settings').doc('master_data').onSnapshot((doc) => {
            if (doc.exists) {
                const data = doc.data();
                if (data.items) {
                    setMasterData(data.items);
                    localStorage.setItem('cup_master', JSON.stringify(data.items));
                }
                if (data.rawCsv) {
                    setRawCsvData(data.rawCsv);
                    localStorage.setItem('cup_raw_csv', JSON.stringify(data.rawCsv));
                }
            }
        });
        return () => unsubscribeMaster();
      }, []);

      useEffect(() => { localStorage.setItem('cup_completed_locs', JSON.stringify(completedLocations)); }, [completedLocations]);

      const saveInventory = (newInv) => {
        setInventory(newInv);
        localStorage.setItem('cup_inv', JSON.stringify(newInv));
        if (db) {
            db.collection('inventory_sessions').doc('current').set({ 
                items: newInv, 
                lastUpdated: firebase.firestore.FieldValue.serverTimestamp() 
            }).catch(e => console.error("雲端同步失敗", e));
        }
      };

      const saveBindsToCloud = (newBinds) => {
        setManualBinds(newBinds);
        localStorage.setItem('cup_binds', JSON.stringify(newBinds));
        if (db) {
            db.collection('inventory_settings').doc('global_binds').set({ binds: newBinds }, { merge: true })
              .catch(e => console.error("綁定同步失敗", e));
        }
      };

      const startScanner = async () => {
        const gate = document.getElementById('cam-gate');
        if (gate) gate.style.display = 'none';
        setIsScanning(true);
        setNameSearchResults([]);

        if (!scannerRef.current) scannerRef.current = new Html5Qrcode("reader");

        try {
          await scannerRef.current.start(
            { facingMode: "environment" },
            { 
              fps: 10, 
              qrbox: (viewfinderWidth, viewfinderHeight) => {
                  return { width: Math.floor(viewfinderWidth * 0.85), height: 250 };
              },
              formatsToSupport: [
                  Html5QrcodeSupportedFormats.CODE_39,
                  Html5QrcodeSupportedFormats.CODE_128,
                  Html5QrcodeSupportedFormats.EAN_13,
                  Html5QrcodeSupportedFormats.EAN_8,
                  Html5QrcodeSupportedFormats.QR_CODE
              ],
              videoConstraints: { 
                  facingMode: "environment",
                  width: { ideal: 1920 }, 
                  height: { ideal: 1080 }
              } 
            },
            (decodedText) => { 
              const f = document.getElementById('flash-overlay'); 
              if(f) { f.classList.add('flash-active'); setTimeout(() => f.classList.remove('flash-active'), 300); }
              if (navigator.vibrate) navigator.vibrate(80);

              const code = String(decodedText).trim(); 
              setScannedBarcode(code);
              
              const { masterData, manualBinds } = dataRef.current;
              const found = masterData.find(m => String(m.barcode) === code || String(m.id) === code) || manualBinds[code];
              setCurrentItem(found || null);
              setQty('');

              if (!found) {
                  setUnknownBarcode(code);
              }

              if (scannerRef.current) {
                  scannerRef.current.stop().then(() => {
                      setIsScanning(false);
                      const gate = document.getElementById('cam-gate');
                      if (gate) gate.style.display = 'flex';
                  }).catch(err => console.error("停止相機失敗", err));
              }
            }
          );
        } catch (err) { 
            alert("相機啟動失敗 (iOS 需確認權限)：" + err);
            setIsScanning(false);
            if (gate) gate.style.display = 'flex';
        }
      };

      const handleManualInput = (text) => {
          setScannedBarcode(text);
          
          const exactMatch = masterData.find(m => String(m.barcode) === text || String(m.id) === text) || manualBinds[text];
          
          if (exactMatch) {
              setCurrentItem(exactMatch);
              setNameSearchResults([]); 
          } else {
              setCurrentItem(null);
              if (text.length > 0) {
                  const results = masterData.filter(m => 
                      m.name.toLowerCase().includes(text.toLowerCase()) || 
                      String(m.barcode).includes(text) ||
                      String(m.id).includes(text)
                  ).slice(0, 15);
                  setNameSearchResults(results);
              } else {
                  setNameSearchResults([]);
              }
          }
      };

      const selectSearchResult = (item) => {
          setScannedBarcode(item.id !== '0' ? item.id : item.barcode);
          setCurrentItem(item);
          setNameSearchResults([]);
      };

      const handleAddRecord = () => {
        if (nameSearchResults.length > 0 && !currentItem) {
            return alert("請從下拉清單中選擇正確的商品！");
        }
        
        const parsedQty = parseInt(qty, 10);
        if (!scannedBarcode) return alert("請先掃描或輸入條碼/品號/商品名稱！");
        if (isNaN(parsedQty) || parsedQty <= 0) return alert("請輸入有效的數量！(不能為空白或0)");
        
        const item = currentItem || { id: "NEW", name: "未知商品" };

        const existingIdx = inventory.findIndex(i => i.barcode === scannedBarcode && i.location === currentLocation);
        let newInv = [...inventory];

        if (existingIdx > -1) {
            newInv[existingIdx].qty += parsedQty;
            newInv[existingIdx].time = new Date().toLocaleTimeString();
            const updatedItem = newInv.splice(existingIdx, 1)[0];
            newInv.unshift(updatedItem);
        } else {
            newInv.unshift({ ...item, barcode: scannedBarcode, qty: parsedQty, location: currentLocation, time: new Date().toLocaleTimeString() });
        }
        
        saveInventory(newInv);
        setFeedback(`✅ 已送出: ${item.name} (${parsedQty}件)`);
        setScannedBarcode('');
        setCurrentItem(null); 
        setQty(''); 
        setTimeout(() => setFeedback(''), 2500);
      };

      const updateInventoryQty = (index, delta) => {
          let newInv = [...inventory];
          let currentQty = parseInt(newInv[index].qty, 10) || 0;
          const newQty = currentQty + delta;
          if (newQty > 0) {
              newInv[index].qty = newQty;
              saveInventory(newInv);
          }
      };

      const setInventoryItemQtyText = (index, val) => {
          let newInv = [...inventory];
          newInv[index].qty = val; 
          setInventory(newInv); 
      };

      const handleQtyBlur = (index) => {
          let newInv = [...inventory];
          const parsed = parseInt(newInv[index].qty, 10);
          if (isNaN(parsed) || parsed <= 0) {
              newInv[index].qty = 1; 
          } else {
              newInv[index].qty = parsed;
          }
          saveInventory(newInv);
      };

      const updateInventoryLocation = (index, newLocation) => {
          let newInv = [...inventory];
          newInv[index].location = newLocation;
          saveInventory(newInv);
      };

      const handleDeleteCurrentSession = () => {
        if (confirm("⚠️ 確定要刪除本次所有的盤點資料嗎？此操作無法恢復。")) {
            saveInventory([]);
            alert("盤點資料已清空");
        }
      };

      const toggleLocationComplete = () => {
        if (completedLocations.includes(currentLocation)) {
          setCompletedLocations(completedLocations.filter(loc => loc !== currentLocation));
        } else {
          setCompletedLocations([...completedLocations, currentLocation]);
        }
      };

      // 👑 升級：精準讀取原檔，完整保留矩陣與空行跳過邏輯
      const handleImportCSV = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        Papa.parse(file, {
            header: false, 
            skipEmptyLines: 'greedy', // 避免最後有空行導致矩陣錯誤
            complete: function(res) {
                const raw = res.data;
                if(raw.length < 2) return alert("檔案格式有誤或無資料！");
                
                const headers = raw[0];
                const barcodeIdx = headers.indexOf('物料') > -1 ? headers.indexOf('物料') : headers.indexOf('條碼');
                const idIdx = headers.lastIndexOf('品號') > -1 ? headers.lastIndexOf('品號') : headers.indexOf('商品碼');
                const nameIdx = headers.indexOf('品名') > -1 ? headers.indexOf('品名') : headers.indexOf('商品名稱規格');

                if(barcodeIdx === -1 && idIdx === -1) {
                    return alert("⚠️ 找不到「物料/條碼」或「品號」欄位，請確認您上傳的是正確的系統匯出檔！");
                }

                const parsed = [];
                for(let i = 1; i < raw.length; i++){
                    const row = raw[i];
                    parsed.push({
                        id: idIdx > -1 ? String(row[idIdx] || '0') : '0',
                        name: nameIdx > -1 ? String(row[nameIdx] || '未知') : '未知',
                        barcode: barcodeIdx > -1 ? String(row[barcodeIdx] || '').replace(/\s+/g, '').replace(/\.0$/, '') : ''
                    });
                }
                
                const validParsed = parsed.filter(i => i.barcode || i.id !== '0');
                
                setMasterData(validParsed);
                setRawCsvData(raw); 
                localStorage.setItem('cup_raw_csv', JSON.stringify(raw));
                
                if (db) {
                    db.collection('inventory_settings').doc('master_data').set({ items: validParsed, rawCsv: raw })
                      .catch(err => alert("⚠️ 主檔上傳雲端失敗，但您的本機已更新。"));
                }
                
                alert(`✅ 成功匯入 ${validParsed.length} 筆資料，並已完整記憶原檔格式！`);
                setShowAdmin(false);
            }
        });
      };

      // 👑 無損格式匯出：只更改數值，生成一個全新的檔案
      const handleExportERP = () => {
          if (inventory.length === 0) return alert("目前沒有任何盤點資料可以匯出！");
          
          if (!rawCsvData || rawCsvData.length === 0) {
              return alert("⚠️ 系統內尚未記憶您的原檔格式。\n\n請先前往右上角「⚙️ 管理」，重新匯入一次您的原始 CSV 檔案，讓系統記住格式後再進行匯出！");
          }

          let exportData = JSON.parse(JSON.stringify(rawCsvData));
          const headers = exportData[0];
          
          let stockIdx = headers.indexOf('門市庫存');
          if (stockIdx === -1) {
              headers.push('門市庫存'); 
              stockIdx = headers.length - 1;
          }
          
          const barcodeIdx = headers.indexOf('物料') > -1 ? headers.indexOf('物料') : headers.indexOf('條碼');
          const idIdx = headers.lastIndexOf('品號') > -1 ? headers.lastIndexOf('品號') : headers.indexOf('商品碼');

          // 1. 加總所有已盤點數量
          const qtyMap = {};
          inventory.forEach(item => {
              const key = item.id !== '0' && item.id !== 'NEW' ? item.id : item.barcode;
              if (!qtyMap[key]) qtyMap[key] = 0;
              qtyMap[key] += parseInt(item.qty, 10) || 0;
          });

          // 2. 將數量填回一模一樣的格式表中
          for (let i = 1; i < exportData.length; i++) {
              const row = exportData[i];
              while (row.length < headers.length) row.push(''); // 防呆補齊欄位

              const mBarcode = barcodeIdx > -1 ? String(row[barcodeIdx] || '').replace(/\s+/g, '').replace(/\.0$/, '') : '';
              const mId = idIdx > -1 ? String(row[idIdx] || '0') : '0';
              const key = mId !== '0' ? mId : mBarcode;

              // 確保大於 0 才填入，且如果主檔有重複行，填完一次就標記 -1 避免重複疊加
              if (qtyMap[key] !== undefined && qtyMap[key] !== -1 && qtyMap[key] > 0) {
                  row[stockIdx] = qtyMap[key];
                  qtyMap[key] = -1; 
              } else {
                  row[stockIdx] = ''; // 沒盤到就維持空白
              }
          }

          // 3. 把有盤到、但主檔卻沒有的「未知商品/新增商品」補在最後面
          inventory.forEach(item => {
              const key = item.id !== '0' && item.id !== 'NEW' ? item.id : item.barcode;
              // 如果它大於0，代表它沒有在上面被扣成 -1 (也就是原檔中沒有這個商品)
              if (qtyMap[key] !== undefined && qtyMap[key] !== -1 && qtyMap[key] > 0) { 
                  const newRow = new Array(headers.length).fill('');
                  newRow[0] = '商品'; // 預設屬性
                  if (barcodeIdx > -1) newRow[barcodeIdx] = item.barcode;
                  if (idIdx > -1) newRow[idIdx] = item.id !== 'NEW' ? item.id : '';
                  
                  const nameIdx = headers.indexOf('品名') > -1 ? headers.indexOf('品名') : headers.indexOf('商品名稱規格');
                  if (nameIdx > -1) newRow[nameIdx] = item.name;
                  
                  newRow[stockIdx] = qtyMap[key];
                  exportData.push(newRow);
                  qtyMap[key] = -1;
              }
          });

          // 4. 輸出全新的 CSV 檔案 (格式保證 100% 一致)
          const csv = Papa.unparse(exportData);
          const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          // 檔名設定為「門市庫存_盤點總表_日期」，這樣就不會覆蓋到您原本的上傳檔
          a.download = `門市庫存_盤點總表_${new Date().toISOString().slice(0,10)}.csv`;
          a.click();
      };

      const handleExportDetails = () => {
          if (inventory.length === 0) return alert("目前沒有任何盤點資料可以匯出！");
          let csv = "\ufeff場域,貨號,品名,條碼,數量,時間\n";
          inventory.forEach(i => csv += `"${i.location}","${i.id}","${i.name}","${i.barcode}",${i.qty},"${i.time}"\n`);
          const a = document.createElement("a"); 
          a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
          a.download = `Cupicho_各區明細_${new Date().toISOString().slice(0,10)}.csv`; 
          a.click();
      };

      const bindExisting = (item) => {
        const newBinds = { ...manualBinds, [unknownBarcode]: { id: item.id, name: item.name } };
        saveBindsToCloud(newBinds);
        setCurrentItem({ id: item.id, name: item.name }); 
        setUnknownBarcode(null);
      };

      const bindNewProduct = () => {
        if(!newProductName) return alert("請輸入全新的商品名稱！");
        const newBinds = { ...manualBinds, [unknownBarcode]: { id: "NEW", name: newProductName } };
        saveBindsToCloud(newBinds);
        setCurrentItem({ id: "NEW", name: newProductName }); 
        setUnknownBarcode(null);
        alert(`已建立新品：${newProductName}`);
      };

      return (
        <div className="flex flex-col min-h-screen">
          <div id="flash-overlay" className="fixed inset-0 pointer-events-none z-[1100]"></div>
          
          <header className="p-4 flex justify-between items-center bg-slate-950 border-b border-slate-900 sticky top-0 z-[100]">
              <div className="cursor-pointer" onClick={() => {setShowSummary(false); setShowAdmin(false);}}>
                  <h1 className="text-xl font-black text-yellow-500 italic leading-none">CUPICHO</h1>
                  <p className="text-[9px] font-bold uppercase tracking-widest mt-1">
                    <span className={db ? "text-emerald-500" : "text-slate-500"}>{db ? '☁️ 雲端已連線' : '📱 單機模式'}</span> | 主檔: {masterData.length}
                  </p>
              </div>
              <button onClick={() => setShowAdmin(true)} className="bg-slate-900 text-slate-400 px-4 py-2 rounded-xl border border-slate-800 text-xs font-bold">⚙️ 管理</button>
          </header>

          <section className="relative w-full min-h-[40vh] bg-black overflow-hidden border-b border-slate-900 shadow-xl flex items-center justify-center">
              {isScanning && (
                  <div className="absolute top-4 bg-black/60 text-white px-4 py-1.5 rounded-full text-xs z-[100] border border-slate-700 shadow-lg">
                      📸 建議距離條碼 15~20 公分
                  </div>
              )}
              <div id="reader" className="w-full h-full"></div>
              <div id="cam-gate" className="absolute inset-0 z-20 flex flex-col items-center justify-center bg-slate-950">
                  <button onClick={startScanner} className="bg-yellow-500 text-black px-12 py-5 rounded-2xl font-black text-xl shadow-[0_0_30px_rgba(234,179,8,0.2)] active:scale-95 transition-all">
                    📷 啟提掃描
                  </button>
              </div>
          </section>

          <section className="p-4 -mt-10 relative z-30">
              <div className="glass-card rounded-[32px] p-6 shadow-2xl">
                  <div className="flex flex-col gap-2 mb-4">
                      <div className="flex justify-between items-center ml-1">
                        <label className="text-[9px] text-slate-500 font-bold uppercase tracking-widest">當前盤點場域</label>
                        <button onClick={toggleLocationComplete} className={`text-[10px] px-3 py-1.5 rounded-full font-bold transition-all shadow-sm ${completedLocations.includes(currentLocation) ? 'bg-emerald-500 text-black' : 'bg-slate-800 text-slate-300'}`}>
                          {completedLocations.includes(currentLocation) ? '✅ 已完成此區' : '⬜ 標記為完成'}
                        </button>
                      </div>
                      <select value={currentLocation} onChange={e => setCurrentLocation(e.target.value)} className="w-full bg-black border border-slate-700 text-yellow-500 text-sm px-4 py-3 rounded-2xl outline-none appearance-none">
                          {LOCATIONS.map(loc => <option key={loc} value={loc}>{completedLocations.includes(loc) ? '✅ ' : '📍 '}{loc}</option>)}
                      </select>
                      <div className="text-[10px] text-emerald-500 font-bold px-2 h-4">{feedback}</div>
                  </div>

                  <div className="text-center mb-6 border-b border-slate-800 pb-4">
                      <div className={`text-lg font-bold mb-1 ${currentItem ? 'text-white' : (scannedBarcode ? 'text-red-500' : 'text-slate-400')}`}>
                          {currentItem ? currentItem.name : (scannedBarcode ? '⚠️ 尚未鎖定商品' : '等待掃描...')}
                      </div>
                      <div className="text-xs text-yellow-600 font-mono tracking-widest uppercase h-4">
                          {currentItem ? (currentItem.id !== '0' ? `品號: ${currentItem.id}` : `物料: ${currentItem.barcode}`) : (scannedBarcode && !nameSearchResults.length ? `輸入: ${scannedBarcode}` : '')}
                      </div>
                  </div>

                  <div className="grid grid-cols-4 gap-3 relative">
                      <div className="col-span-3 relative">
                          <input type="text" value={scannedBarcode} onChange={e => handleManualInput(e.target.value)} className="w-full bg-black border border-slate-700 rounded-2xl p-4 text-white font-mono outline-none focus:border-yellow-500 placeholder-slate-600 text-sm" placeholder="輸入物料、品號或品名" />
                          
                          {nameSearchResults.length > 0 && (
                              <div className="absolute z-50 w-full bg-slate-800 border border-slate-600 mt-2 rounded-xl shadow-2xl max-h-[250px] overflow-y-auto">
                                  {nameSearchResults.map(item => (
                                      <div key={item.id} onClick={() => selectSearchResult(item)} className="p-3 border-b border-slate-700/50 last:border-0 hover:bg-slate-700 cursor-pointer flex flex-col gap-1">
                                          <span className="text-white text-xs font-bold leading-snug">{item.name}</span>
                                          <span className="text-yellow-500 text-[10px] font-mono">品號: {item.id !== '0' ? item.id : '無'} | 物料: {item.barcode}</span>
                                      </div>
                                  ))}
                              </div>
                          )}
                      </div>
                      
                      <input type="number" value={qty} onChange={e => setQty(e.target.value)} className="col-span-1 bg-black border border-slate-700 rounded-2xl p-4 text-2xl font-black text-center text-yellow-500 outline-none focus:border-yellow-500 placeholder-slate-700" placeholder="數量" />
                      
                      <button onClick={handleAddRecord} className="col-span-4 bg-gradient-to-br from-yellow-400 to-yellow-600 text-black py-5 rounded-2xl active:scale-95 text-xl font-bold shadow-lg mt-2">確認送出</button>
                  </div>
              </div>
          </section>

          <section className="p-4 flex-1 pb-40">
              <div className="flex justify-between items-center mb-4 px-2">
                  <h2 className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">歷史盤點清單</h2>
                  <button onClick={() => setShowSummary(true)} className="text-xs font-bold text-yellow-500 bg-yellow-500/10 px-3 py-1 rounded-lg">📊 各區總覽</button>
              </div>
              <div className="space-y-3">
                  {inventory.map((i, idx) => (
                    <div key={idx} className="glass-card p-4 rounded-3xl flex justify-between items-center shadow-sm">
                        <div className="flex-1 pr-3">
                            <div className="flex flex-col items-start gap-1 mb-1">
                                <div className="relative inline-block w-full max-w-[160px]">
                                    <select
                                        value={i.location}
                                        onChange={(e) => updateInventoryLocation(idx, e.target.value)}
                                        className="w-full text-[10px] bg-yellow-500 text-black pl-2 pr-5 py-0.5 rounded font-bold appearance-none cursor-pointer outline-none border-none text-left truncate"
                                    >
                                        {LOCATIONS.map(loc => <option key={loc} value={loc}>{loc}</option>)}
                                    </select>
                                    <span className="absolute right-1 top-1/2 transform -translate-y-1/2 text-black text-[8px] pointer-events-none">▼</span>
                                </div>
                                <span className="font-bold text-slate-100 text-sm leading-snug break-words w-full">{i.name}</span>
                            </div>
                            <div className="text-[10px] text-slate-500 font-mono mt-1">{i.barcode} • {i.time}</div>
                        </div>
                        
                        <div className="flex items-center gap-2">
                            <div className="flex items-center bg-slate-800 rounded-lg overflow-hidden border border-slate-700 flex-shrink-0">
                                <button onClick={() => updateInventoryQty(idx, -1)} className="px-3 py-2 text-slate-300 hover:bg-slate-600 hover:text-white transition-colors text-lg font-bold">-</button>
                                <input 
                                    type="number" 
                                    value={i.qty} 
                                    onChange={(e) => setInventoryItemQtyText(idx, e.target.value)}
                                    onBlur={() => handleQtyBlur(idx)}
                                    className="text-lg font-black text-yellow-500 w-10 text-center bg-black py-2 outline-none" 
                                />
                                <button onClick={() => updateInventoryQty(idx, 1)} className="px-3 py-2 text-slate-300 hover:bg-slate-600 hover:text-white transition-colors text-lg font-bold">+</button>
                            </div>
                            <button onClick={() => { const newInv = [...inventory]; newInv.splice(idx, 1); saveInventory(newInv); }} className="text-slate-500 text-3xl hover:text-red-500 ml-1 leading-none pb-1 flex-shrink-0">×</button>
                        </div>
                    </div>
                  ))}
              </div>
          </section>

          <div className="fixed bottom-6 left-1/2 transform -translate-x-1/2 w-[95%] max-w-sm z-[100]">
              <div className="bg-yellow-500 p-4 rounded-3xl flex justify-between items-center px-4 shadow-2xl border-4 border-slate-950">
                  <div className="flex flex-col mr-2">
                    <span className="text-black font-bold text-[8px] uppercase leading-none">Total Items</span>
                    <span className="text-2xl font-black text-black leading-none">{inventory.reduce((a, b) => a + (parseInt(b.qty)||0), 0)}</span>
                  </div>
                  
                  <div className="flex gap-1">
                      <button onClick={handleDeleteCurrentSession} className="bg-red-600 text-white px-2 py-2 rounded-xl text-xs font-black shadow-md flex-shrink-0">刪除</button>
                      <button onClick={handleExportDetails} className="bg-slate-800 text-slate-300 px-2 py-2 rounded-xl text-xs font-black shadow-md flex-shrink-0">匯出明細</button>
                      <button onClick={handleExportERP} className="bg-black text-yellow-500 px-3 py-2 rounded-xl text-xs font-black shadow-md flex-shrink-0 whitespace-nowrap">匯出總表</button>
                  </div>
              </div>
          </div>

          {unknownBarcode && (
            <div className="modal-overlay">
                <div className="flex items-center justify-center mb-6 relative">
                    <button onClick={() => setUnknownBarcode(null)} className="absolute left-0 top-0 bg-red-600 hover:bg-red-500 text-white px-4 py-2 rounded-xl font-bold flex items-center gap-2 text-sm z-20 shadow-[0_0_15px_rgba(220,38,38,0.4)]">
                        ⬅ 返回
                    </button>
                    <h3 className="text-lg font-bold text-white pointer-events-none mt-1.5">⚠️ 未知商品</h3>
                </div>
                
                <div className="bg-yellow-500/10 border border-yellow-500/30 p-4 rounded-2xl mb-6 text-center mt-2 flex-shrink-0">
                    <p className="text-[10px] text-yellow-500 mb-1">掃描到的條碼 / 品號</p>
                    <p className="text-2xl font-mono font-bold text-white">{unknownBarcode}</p>
                </div>

                <div className="bg-slate-900 p-5 rounded-3xl border border-slate-800 mb-4 shadow-lg flex-shrink-0">
                  <h4 className="text-emerald-400 font-bold mb-3 text-sm">選項 A：新增為全新商品</h4>
                  <input type="text" value={newProductName} onChange={e=>setNewProductName(e.target.value)} className="w-full bg-black border border-slate-700 p-4 rounded-2xl text-white outline-none mb-3" placeholder="請輸入商品名稱"/>
                  <button onClick={bindNewProduct} className="w-full bg-emerald-600 text-white py-4 rounded-2xl font-bold">✅ 確認新增</button>
                </div>

                <div className="bg-slate-900 p-5 rounded-3xl border border-slate-800 flex-1 overflow-y-auto min-h-[250px]">
                  <h4 className="text-blue-400 font-bold mb-3 text-sm">選項 B：尋找現有商品綁定</h4>
                  <input type="text" value={searchQuery} onChange={e=>setSearchQuery(e.target.value)} className="w-full bg-black border border-slate-700 p-4 rounded-2xl text-white outline-none mb-3" placeholder="搜尋主檔名稱、物料或品號..."/>
                  
                  <div className="space-y-2">
                    {searchQuery.length > 0 && masterData.filter(m => m.name.toLowerCase().includes(searchQuery.toLowerCase()) || String(m.barcode).includes(searchQuery) || String(m.id).includes(searchQuery)).slice(0, 10).map(item => (
                      <div key={item.id} onClick={() => bindExisting(item)} className="bg-blue-900/30 p-4 rounded-xl border border-blue-500/20 flex justify-between items-center cursor-pointer hover:bg-blue-900/50">
                          <div className="font-bold text-white text-xs leading-snug">{item.name}</div>
                          <span className="text-[10px] font-bold border border-blue-400 px-3 py-1 rounded-full text-blue-300 ml-2 flex-shrink-0 bg-blue-900/50">綁定</span>
                      </div>
                    ))}
                    {searchQuery.length > 0 && masterData.filter(m => m.name.toLowerCase().includes(searchQuery.toLowerCase()) || String(m.barcode).includes(searchQuery) || String(m.id).includes(searchQuery)).length === 0 && (
                        <div className="text-slate-500 text-xs text-center py-4">查無此商品資訊</div>
                    )}
                  </div>
                </div>
            </div>
          )}

          {showAdmin && (
            <div className="modal-overlay">
                <div className="flex justify-between items-center mb-6">
                    <h3 className="text-2xl font-bold text-white italic">⚙️ 系統設定</h3>
                    <button onClick={() => setShowAdmin(false)} className="text-slate-500 text-4xl">×</button>
                </div>
                
                <div className="bg-emerald-900/20 border border-emerald-500/30 p-6 rounded-[32px] mb-6">
                    <h4 className="text-emerald-500 font-bold mb-2">📥 匯入新商品主檔</h4>
                    <input type="file" accept=".csv" style={{ display: 'none' }} id="csv-file" onChange={handleImportCSV} />
                    <button onClick={() => document.getElementById('csv-file').click()} className="bg-emerald-600 text-white w-full py-4 rounded-2xl font-bold shadow-lg mt-2">📁 選擇 CSV 檔案</button>
                    <p className="text-[10px] text-slate-400 mt-3 leading-snug">
                        ⚠️ <strong className="text-emerald-500">更新V7.2公告：</strong><br/>請重新上傳一次最新的商品 CSV 檔案，系統將會完整記憶您的檔案格式（包含重複的欄位名稱）。匯出總表時即可直接產出與上傳格式完全一模一樣的最終庫存檔。
                    </p>
                </div>

                <button onClick={() => { if(confirm('⚠️ 確定清除所有設定？')){localStorage.clear();location.reload();} }} className="text-slate-600 text-xs font-bold py-4 mt-auto text-center w-full">重置系統核心快取</button>
            </div>
          )}

          {showSummary && (
            <div className="modal-overlay">
                <div className="flex justify-between items-center mb-6">
                    <h3 className="text-xl font-bold text-white italic">📊 各區盤點進度</h3>
                    <button onClick={() => setShowSummary(false)} className="text-slate-500 text-4xl">×</button>
                </div>
                <div className="flex-1 overflow-y-auto space-y-4">
                  {LOCATIONS.map(loc => {
                    const items = inventory.filter(i => i.location === loc);
                    const isDone = completedLocations.includes(loc);
                    if (items.length === 0 && !isDone) return null;

                    return (
                      <div key={loc} className={`border rounded-[24px] overflow-hidden ${isDone ? 'bg-emerald-900/10 border-emerald-800' : 'bg-slate-900 border-slate-800'}`}>
                          <div className={`px-5 py-3 flex justify-between items-center ${isDone ? 'bg-emerald-900/30' : 'bg-slate-800/80'}`}>
                            <span className={`font-bold ${isDone ? 'text-emerald-400' : 'text-yellow-500'}`}>{isDone ? '✅ ' : ''}{loc}</span>
                            <span className="text-[10px] text-slate-400 font-bold">小計 {items.reduce((sum, item) => sum + (parseInt(item.qty)||0), 0)} 件 / {items.length} 項</span>
                          </div>
                          
                          {items.length > 0 && (
                            <div className="bg-slate-950/50 px-5 py-2 border-t border-slate-800/50">
                                {items.map((item, idx) => (
                                    <div key={idx} className="flex justify-between items-center py-2 border-b border-slate-800/50 last:border-0 gap-3">
                                        <div className="text-xs text-slate-300 leading-snug flex-1 break-words">{item.name}</div>
                                        <div className="text-sm font-black text-yellow-500 bg-black px-2 py-1 rounded">{item.qty}</div>
                                    </div>
                                ))}
                            </div>
                          )}
                      </div>
                    )
                  })}
                </div>
                <button onClick={() => setShowSummary(false)} className="mt-6 w-full bg-slate-800 text-white py-4 rounded-2xl font-bold shadow-lg flex-shrink-0">返回盤點</button>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
